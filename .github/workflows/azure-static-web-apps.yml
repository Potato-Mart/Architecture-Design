name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  build_and_deploy:
    if: github.event_name == 'push' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and deploy
    env:
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || '/api' }}
      VITE_ISSUES_ENDPOINT: ${{ vars.VITE_ISSUES_ENDPOINT || '/issues' }}
      VITE_ISSUE_DETAIL_ENDPOINT: ${{ vars.VITE_ISSUE_DETAIL_ENDPOINT || '/issues/:id' }}
      VITE_ISSUE_SYNC_ENDPOINT: ${{ vars.VITE_ISSUE_SYNC_ENDPOINT || '/issues/:id/sync' }}
      VITE_ISSUES_BULK_ENDPOINT: ${{ vars.VITE_ISSUES_BULK_ENDPOINT || '/issues/bulk' }}
      VITE_ISSUES_BULK_BODY_KEY: ${{ vars.VITE_ISSUES_BULK_BODY_KEY || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /
          api_location: ""
          output_location: dist
          app_build_command: npm run build

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close pull request environment
    steps:
      - name: Close Azure Static Web Apps preview
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: close
