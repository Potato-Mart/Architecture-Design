[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: serve index.html for client-side routes (TanStack Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers applied to every response
[[headers]]
  for = "/*"
  [headers.values]
    # Lock everything to same-origin. No third-party origins are used
    # (Inter font is self-hosted, no external scripts/APIs).
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self'; img-src 'self' data:; font-src 'self'; connect-src 'self'; manifest-src 'self'; worker-src 'self'; upgrade-insecure-requests"
    # Clickjacking protection (legacy header alongside frame-ancestors)
    X-Frame-Options = "DENY"
    # Block MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Limit referrer leakage
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Disable powerful browser features the site does not use
    Permissions-Policy = "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), usb=(), interest-cohort=(), browsing-topics=()"
    # Force HTTPS for 2 years, include subdomains, allow preload list
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    # Cross-origin isolation hardening
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    # Disable the legacy XSS auditor (superseded by CSP; can introduce bugs)
    X-XSS-Protection = "0"

# Long-term caching for content-hashed build assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache the HTML entry so deploys take effect immediately
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
